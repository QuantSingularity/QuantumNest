---
- name: Install nginx
  ansible.builtin.package:
    name:
      - nginx
      - nginx-extras
    state: present
  become: true

- name: Configure nginx
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/nginx -t -c %s"
  become: true
  notify: reload nginx

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
  become: true
