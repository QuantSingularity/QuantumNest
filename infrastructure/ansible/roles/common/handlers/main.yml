---
- name: restart auditd
  ansible.builtin.systemd:
    name: auditd
    state: restarted
  become: true

- name: restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted
  become: true

- name: restart chrony
  ansible.builtin.systemd:
    name: chronyd
    state: restarted
  become: true

- name: restart sshd
  ansible.builtin.systemd:
    name: ssh
    state: restarted
  become: true

- name: reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  become: true

- name: restart unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: restarted
  become: true

- name: restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
  become: true
