---
# QuantumNest Common Role - Financial Services Security and Compliance

- name: Update system packages
  ansible.builtin.package:
    name: "*"
    state: latest
  become: true
  tags:
    - security
    - updates

- name: Install essential security packages
  ansible.builtin.package:
    name:
      - fail2ban
      - aide
      - auditd
      - rsyslog
      - logrotate
      - chrony
      - ufw
      - rkhunter
      - clamav
      - clamav-daemon
      - osquery
      - unattended-upgrades
    state: present
  become: true
  tags:
    - security
    - packages

- name: Configure automatic security updates
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart unattended-upgrades
  tags:
    - security
    - updates

- name: Enable and configure auditd for compliance logging
  ansible.builtin.template:
    src: audit.rules.j2
    dest: /etc/audit/rules.d/quantumnest.rules
    owner: root
    group: root
    mode: "0640"
  become: true
  notify: restart auditd
  tags:
    - security
    - compliance
    - logging

- name: Configure auditd main configuration
  ansible.builtin.template:
    src: auditd.conf.j2
    dest: /etc/audit/auditd.conf
    owner: root
    group: root
    mode: "0640"
  become: true
  notify: restart auditd
  tags:
    - security
    - compliance

- name: Ensure auditd is enabled and running
  ansible.builtin.systemd:
    name: auditd
    state: started
    enabled: true
  become: true
  tags:
    - security
    - compliance

- name: Configure rsyslog for centralized logging
  ansible.builtin.template:
    src: rsyslog.conf.j2
    dest: /etc/rsyslog.d/99-quantumnest.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart rsyslog
  tags:
    - logging

- name: Ensure rsyslog is enabled and running
  ansible.builtin.systemd:
    name: rsyslog
    state: started
    enabled: true
  become: true
  tags:
    - logging

- name: Configure chrony for time synchronization
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart chrony
  tags:
    - security
    - compliance

- name: Ensure chrony is enabled and running
  ansible.builtin.systemd:
    name: chronyd
    state: started
    enabled: true
  become: true
  tags:
    - security

- name: Set secure file permissions on sensitive directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "/etc/ssh", mode: "0700" }
    - { path: "/etc/audit", mode: "0750" }
    - { path: "/var/log", mode: "0755" }
  become: true
  tags:
    - security
    - hardening

- name: Configure SSH hardening
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "/usr/sbin/sshd -t -f %s"
  become: true
  notify: restart sshd
  tags:
    - security
    - hardening

- name: Disable unnecessary kernel modules
  ansible.builtin.copy:
    dest: /etc/modprobe.d/quantumnest-blacklist.conf
    content: |
      install cramfs /bin/false
      install freevxfs /bin/false
      install jffs2 /bin/false
      install hfs /bin/false
      install hfsplus /bin/false
      install squashfs /bin/false
      install udf /bin/false
      install dccp /bin/false
      install sctp /bin/false
      install rds /bin/false
      install tipc /bin/false
    owner: root
    group: root
    mode: "0644"
  become: true
  tags:
    - security
    - hardening

- name: Configure sysctl for security hardening
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-quantumnest-security.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload sysctl
  tags:
    - security
    - hardening

- name: Configure UFW firewall
  ansible.builtin.ufw:
    state: enabled
    policy: deny
    direction: incoming
  become: true
  tags:
    - security
    - firewall

- name: Allow SSH through firewall
  ansible.builtin.ufw:
    rule: allow
    name: OpenSSH
  become: true
  tags:
    - security
    - firewall

- name: Configure fail2ban
  ansible.builtin.template:
    src: fail2ban.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart fail2ban
  tags:
    - security

- name: Ensure fail2ban is enabled and running
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  become: true
  tags:
    - security

- name: Initialize AIDE database (first run)
  ansible.builtin.command:
    cmd: aide --init
    creates: /var/lib/aide/aide.db.new
  become: true
  tags:
    - security
    - compliance
  when: ansible_run_tags | intersect(['security', 'all']) | length > 0

- name: Move AIDE initial database into place
  ansible.builtin.copy:
    src: /var/lib/aide/aide.db.new
    dest: /var/lib/aide/aide.db
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  become: true
  tags:
    - security
    - compliance

- name: Schedule periodic AIDE checks
  ansible.builtin.cron:
    name: "AIDE integrity check"
    minute: "0"
    hour: "2"
    job: "/usr/bin/aide --check > /var/log/aide/aide-check.log 2>&1"
    user: root
  become: true
  tags:
    - security
    - compliance

- name: Configure ClamAV database updates
  ansible.builtin.systemd:
    name: clamav-freshclam
    state: started
    enabled: true
  become: true
  tags:
    - security

- name: Ensure log directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - /var/log/aide
    - /var/log/quantumnest
  become: true
  tags:
    - logging
    - security
