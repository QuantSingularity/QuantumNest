---
# QuantumNest Main Playbook

- name: Apply common security hardening
  hosts: all
  become: true
  gather_facts: true
  vars:
    environment: "{{ env | default('dev') }}"
  roles:
    - role: common
      tags:
        - common
        - security
        - hardening

- name: Configure web servers
  hosts: webservers
  become: true
  gather_facts: true
  roles:
    - role: webserver
      tags:
        - webserver
        - nginx

- name: Configure database servers
  hosts: databases
  become: true
  gather_facts: true
  roles:
    - role: database
      tags:
        - database
        - postgres
