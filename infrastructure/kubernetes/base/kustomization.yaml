apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: quantumnest-prod

resources:
  - namespace.yaml
  - rbac.yaml
  - app-configmap.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - database-statefulset.yaml
  - database-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - redis-pvc.yaml
  - ingress.yaml

# Secrets must be managed externally via External Secrets Operator
# See: security/secrets/external-secrets-operator/external-secrets.yaml
# - app-secrets.yaml  # DO NOT include actual secrets in git

commonLabels:
  app.kubernetes.io/part-of: quantumnest-platform
  managed-by: kustomize
