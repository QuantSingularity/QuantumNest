apiVersion: v1
kind: ConfigMap
metadata:
  name: quantumnest-backend-config
  namespace: quantumnest-prod
  labels:
    app: quantumnest-backend
    app.kubernetes.io/name: quantumnest-backend
    app.kubernetes.io/component: backend
data:
  APP_NAME: "QuantumNest Backend"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
  METRICS_PORT: "9090"
  HEALTH_PORT: "8081"
  CORS_ENABLED: "true"
  CORS_ORIGINS: "https://app.quantumnest.com,https://admin.quantumnest.com"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "1000"
  SESSION_TIMEOUT_MINUTES: "30"
  JWT_EXPIRY_HOURS: "8"
  ENCRYPTION_ALGORITHM: "AES-256-GCM"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_CONNECTIONS: "100"
  DATABASE_CONNECTION_TIMEOUT: "30"
  REDIS_POOL_SIZE: "10"
  REDIS_CONNECTION_TIMEOUT: "5"
  AUDIT_LOGGING_ENABLED: "true"
  COMPLIANCE_MODE: "strict"
  PCI_DSS_ENABLED: "true"
  SOX_COMPLIANCE: "true"
  API_URL: "https://app.quantumnest.com/api"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: quantumnest-redis-config
  namespace: quantumnest-prod
  labels:
    app: quantumnest-redis
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port 6379
    tcp-backlog 511
    timeout 300
    tcp-keepalive 60
    daemonize no
    loglevel notice
    databases 16
    save 900 1
    save 300 10
    save 60 10000
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    dir /data
    maxmemory-policy allkeys-lru
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes
    activerehashing yes
    aof-rewrite-incremental-fsync yes
    rdb-save-incremental-fsync yes
