apiVersion: v1
kind: Service
metadata:
  name: quantumnest-database
  namespace: quantumnest-prod
  labels:
    app: quantumnest-database
    tier: database
    app.kubernetes.io/name: quantumnest-database
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: quantumnest-database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
