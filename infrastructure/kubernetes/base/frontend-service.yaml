apiVersion: v1
kind: Service
metadata:
  name: quantumnest-frontend
  namespace: quantumnest-prod
  labels:
    app: quantumnest-frontend
    tier: frontend
    app.kubernetes.io/name: quantumnest-frontend
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: quantumnest-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
