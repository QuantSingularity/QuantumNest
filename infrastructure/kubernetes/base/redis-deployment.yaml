apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantumnest-redis
  namespace: quantumnest-prod
  labels:
    app: quantumnest-redis
    tier: cache
    app.kubernetes.io/name: quantumnest-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: quantumnest-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantumnest-redis
  template:
    metadata:
      labels:
        app: quantumnest-redis
        tier: cache
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: quantumnest-redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - /etc/redis/redis.conf
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: quantumnest-redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 59000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: quantumnest-redis-data
          persistentVolumeClaim:
            claimName: quantumnest-redis-pvc
        - name: redis-config
          configMap:
            name: quantumnest-redis-config
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
