apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quantumnest-database
  namespace: quantumnest-prod
  labels:
    app: quantumnest-database
    tier: database
    app.kubernetes.io/name: quantumnest-database
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: quantumnest-platform
spec:
  serviceName: quantumnest-database
  replicas: 1
  selector:
    matchLabels:
      app: quantumnest-database
  template:
    metadata:
      labels:
        app: quantumnest-database
        tier: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: quantumnest-database
          image: postgres:14-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          resources:
            limits:
              cpu: "2"
              memory: "4Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: POSTGRES_DB
              value: "quantumnest"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: quantumnest-backend-secrets
                  key: db-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quantumnest-backend-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: quantumnest-database-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: quantumnest-database-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp3
        resources:
          requests:
            storage: 100Gi
