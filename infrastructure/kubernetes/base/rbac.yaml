apiVersion: v1
kind: ServiceAccount
metadata:
  name: quantumnest-backend-sa
  namespace: quantumnest-prod
  labels:
    app: quantumnest-backend
    app.kubernetes.io/name: quantumnest-backend
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/quantumnest-prod-backend-irsa"
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quantumnest-backend-role
  namespace: quantumnest-prod
  labels:
    app: quantumnest-backend
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["quantumnest-backend-secrets", "quantumnest-backend-tls"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quantumnest-backend-rolebinding
  namespace: quantumnest-prod
  labels:
    app: quantumnest-backend
subjects:
  - kind: ServiceAccount
    name: quantumnest-backend-sa
    namespace: quantumnest-prod
roleRef:
  kind: Role
  name: quantumnest-backend-role
  apiGroup: rbac.authorization.k8s.io
