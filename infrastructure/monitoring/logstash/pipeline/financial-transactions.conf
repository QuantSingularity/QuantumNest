# Logstash Pipeline Configuration for Financial Transaction Processing

input {
  # Kafka input for real-time transaction logs
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:kafka.quantumnest.internal:9092}"
    topics => ["financial-transactions", "audit-logs", "security-events"]
    group_id => "logstash-financial"
    consumer_threads => 4
    decorate_events => true
    codec => json
    security_protocol => "SASL_SSL"
    sasl_mechanism => "PLAIN"
    jaas_config => "org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_USERNAME}' password='${KAFKA_PASSWORD}';"
    ssl_truststore_location => "/usr/share/logstash/config/certs/kafka.truststore.jks"
    ssl_truststore_password => "${KAFKA_TRUSTSTORE_PASSWORD}"
    auto_offset_reset => "latest"
    session_timeout_ms => "30000"
    heartbeat_interval_ms => "10000"
  }

  # Beats input for application logs
  beats {
    port => 5044
    ssl => true
    ssl_certificate => "/usr/share/logstash/config/certs/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash.key"
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca.crt"]
    ssl_verify_mode => "force_peer"
    client_inactivity_timeout => 60
  }

  # HTTP input for webhook logs
  http {
    port => 8080
    ssl => true
    ssl_certificate => "/usr/share/logstash/config/certs/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash.key"
    codec => json
  }
}

filter {
  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
    target => "@timestamp"
    timezone => "UTC"
  }

  # Add common fields
  mutate {
    add_field => {
      "environment" => "production"
      "platform"    => "quantumnest"
    }
    remove_field => ["headers", "host"]
  }

  # Process financial transaction logs
  if [@metadata][kafka][topic] == "financial-transactions" {
    json {
      source => "message"
      target => "transaction"
      skip_on_invalid_json => true
    }

    # Validate required fields
    if ![transaction][transaction_id] {
      mutate { add_tag => ["_transaction_id_missing"] }
    }

    if ![transaction][amount] {
      mutate { add_tag => ["_amount_missing"] }
    }

    # Convert amount to float for numeric operations
    if [transaction][amount] {
      mutate {
        convert => { "[transaction][amount]" => "float" }
      }

      # Categorize transaction amounts
      if [transaction][amount] >= 10000 {
        mutate {
          add_field => { "transaction_category" => "large" }
          add_tag   => ["large_transaction"]
        }
      } else if [transaction][amount] >= 1000 {
        mutate { add_field => { "transaction_category" => "medium" } }
      } else {
        mutate { add_field => { "transaction_category" => "small" } }
      }

      # Detect potential structuring (transactions just below reporting threshold)
      if [transaction][amount] >= 9500 and [transaction][amount] < 10000 {
        mutate {
          add_tag   => ["suspicious_structuring"]
          add_field => { "alert_type" => "potential_structuring" }
        }
      }
    }

    # Geolocation enrichment (requires GeoLite2 database)
    if [transaction][ip_address] and [transaction][ip_address] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)/ {
      geoip {
        source   => "[transaction][ip_address]"
        target   => "geoip"
        database => "/usr/share/logstash/GeoLite2-City.mmdb"
        fields   => ["city_name", "country_code2", "country_name", "latitude", "longitude", "timezone"]
      }
    }

    # PII masking for compliance - mask in place
    mutate {
      gsub => [
        "[transaction][account_number]", "(?<=\d{4})\d+(?=\d{4})", "****",
        "[transaction][card_number]",    "(?<=\d{4})\d+(?=\d{4})", "****",
        "[transaction][ssn]",            "(?<=\d{3})\d{2}",         "**"
      ]
    }

    # Calculate transaction fingerprint for integrity
    fingerprint {
      source  => ["[transaction][transaction_id]", "[transaction][amount]", "[transaction][timestamp]"]
      target  => "transaction_hash"
      method  => "SHA256"
      key     => "${TRANSACTION_HASH_KEY}"
      base64encode => true
    }

    # Compliance tagging
    mutate {
      add_tag   => ["pci_dss", "sox", "aml"]
      add_field => {
        "data_classification" => "confidential"
        "retention_days"      => "2555"
      }
    }
  }

  # Process audit logs
  if [@metadata][kafka][topic] == "audit-logs" {
    json {
      source => "message"
      target => "audit"
      skip_on_invalid_json => true
    }

    if [audit][user_id] {
      elasticsearch {
        hosts    => ["${ELASTICSEARCH_HOST:https://elasticsearch.quantumnest.internal:9200}"]
        index    => "user-directory"
        query    => "user_id:%{[audit][user_id]}"
        fields   => {
          "department" => "user_department"
          "role"       => "user_role"
          "manager"    => "user_manager"
        }
        ssl      => true
        ca_file  => "/usr/share/logstash/config/certs/ca.crt"
        user     => "${ELASTICSEARCH_USER}"
        password => "${ELASTICSEARCH_PASSWORD}"
      }
    }

    # Classify audit events
    if [audit][action] in ["login", "logout", "password_change", "mfa_enroll"] {
      mutate { add_field => { "audit_category" => "authentication" } }
    } else if [audit][action] in ["create", "update", "delete", "patch"] {
      mutate { add_field => { "audit_category" => "data_modification" } }
    } else if [audit][action] in ["view", "download", "export", "print"] {
      mutate { add_field => { "audit_category" => "data_access" } }
    } else {
      mutate { add_field => { "audit_category" => "other" } }
    }

    mutate {
      add_tag   => ["soc2", "iso27001", "audit_trail"]
      add_field => {
        "data_classification" => "restricted"
        "retention_days"      => "2555"
      }
    }
  }

  # Process security events
  if [@metadata][kafka][topic] == "security-events" {
    json {
      source => "message"
      target => "security"
      skip_on_invalid_json => true
    }

    if [security][ip_address] {
      translate {
        source        => "[security][ip_address]"
        target        => "threat_intel"
        dictionary_path => "/usr/share/logstash/threat_intel.yml"
        fallback      => "unknown"
        refresh_interval => 300
      }
    }

    if [security][event_type] in ["intrusion_attempt", "malware_detected", "policy_violation", "brute_force"] {
      mutate {
        add_field => { "severity" => "high" }
        add_tag   => ["security_incident"]
      }
    } else if [security][event_type] in ["port_scan", "failed_login", "suspicious_query"] {
      mutate {
        add_field => { "severity" => "medium" }
        add_tag   => ["security_warning"]
      }
    }

    mutate {
      add_tag   => ["security", "incident_response"]
      add_field => {
        "data_classification" => "restricted"
        "retention_days"      => "2555"
      }
    }
  }

  # Drop raw sensitive fields before indexing
  mutate {
    remove_field => [
      "[transaction][raw_card_data]",
      "[audit][password]",
      "[audit][old_password]",
      "[security][private_key]",
      "[security][secret]",
      "message"
    ]
  }
}

output {
  # Route by topic to dedicated indices
  if [@metadata][kafka][topic] == "financial-transactions" {
    elasticsearch {
      hosts             => ["${ELASTICSEARCH_HOST:https://elasticsearch.quantumnest.internal:9200}"]
      index             => "financial-transactions-%{+YYYY.MM.dd}"
      template_name     => "financial-transactions"
      template          => "/usr/share/logstash/templates/financial-transactions.json"
      template_overwrite => true
      ssl               => true
      ca_file           => "/usr/share/logstash/config/certs/ca.crt"
      user              => "${LOGSTASH_WRITER_USER:logstash_writer}"
      password          => "${LOGSTASH_WRITER_PASSWORD}"
      retry_on_conflict => 3
      action            => "index"
      ilm_enabled       => true
      ilm_rollover_alias => "financial-transactions"
      ilm_policy        => "financial-data-policy"
    }
  } else if [@metadata][kafka][topic] == "audit-logs" {
    elasticsearch {
      hosts             => ["${ELASTICSEARCH_HOST:https://elasticsearch.quantumnest.internal:9200}"]
      index             => "audit-logs-%{+YYYY.MM.dd}"
      template_name     => "audit-logs"
      template          => "/usr/share/logstash/templates/audit-logs.json"
      template_overwrite => true
      ssl               => true
      ca_file           => "/usr/share/logstash/config/certs/ca.crt"
      user              => "${LOGSTASH_WRITER_USER:logstash_writer}"
      password          => "${LOGSTASH_WRITER_PASSWORD}"
      retry_on_conflict => 3
      ilm_enabled       => true
      ilm_rollover_alias => "audit-logs"
      ilm_policy        => "audit-data-policy"
    }
  } else if [@metadata][kafka][topic] == "security-events" {
    elasticsearch {
      hosts             => ["${ELASTICSEARCH_HOST:https://elasticsearch.quantumnest.internal:9200}"]
      index             => "security-events-%{+YYYY.MM.dd}"
      template_name     => "security-events"
      template          => "/usr/share/logstash/templates/security-events.json"
      template_overwrite => true
      ssl               => true
      ca_file           => "/usr/share/logstash/config/certs/ca.crt"
      user              => "${LOGSTASH_WRITER_USER:logstash_writer}"
      password          => "${LOGSTASH_WRITER_PASSWORD}"
      retry_on_conflict => 3
    }
  }

  # High-priority alerts to dedicated index
  if "security_incident" in [tags] or "large_transaction" in [tags] or "suspicious_structuring" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOST:https://elasticsearch.quantumnest.internal:9200}"]
      index    => "alerts-%{+YYYY.MM.dd}"
      ssl      => true
      ca_file  => "/usr/share/logstash/config/certs/ca.crt"
      user     => "${LOGSTASH_WRITER_USER:logstash_writer}"
      password => "${LOGSTASH_WRITER_PASSWORD}"
    }
  }

  # Dead letter queue for parse failures
  if "_jsonparsefailure" in [tags] or "_transaction_id_missing" in [tags] or "_amount_missing" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOST:https://elasticsearch.quantumnest.internal:9200}"]
      index    => "failed-logs-%{+YYYY.MM.dd}"
      ssl      => true
      ca_file  => "/usr/share/logstash/config/certs/ca.crt"
      user     => "${LOGSTASH_WRITER_USER:logstash_writer}"
      password => "${LOGSTASH_WRITER_PASSWORD}"
    }
  }
}
