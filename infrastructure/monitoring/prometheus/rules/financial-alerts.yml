groups:
  - name: financial-transaction-alerts
    interval: 10s
    rules:
      - alert: HighTransactionFailureRate
        expr: |
          (
            rate(financial_transactions_failed_total[5m])
            /
            rate(financial_transactions_total[5m])
          ) > 0.05
        for: 1m
        labels:
          severity: critical
          category: financial
          compliance: pci-dss
        annotations:
          summary: "High transaction failure rate detected"
          description: "Transaction failure rate is {{ $value | humanizePercentage }} over the last 5 minutes (threshold: 5%)"
          runbook_url: "https://runbooks.quantumnest.com/financial/high-failure-rate"
          impact: "Customer transactions may be failing, potential revenue loss"

      - alert: SuspiciousTransactionPattern
        expr: increase(financial_suspicious_transactions_total[1m]) > 10
        for: 0s
        labels:
          severity: critical
          category: security
          compliance: aml
        annotations:
          summary: "Suspicious transaction pattern detected"
          description: "{{ $value }} suspicious transactions detected in the last minute"
          runbook_url: "https://runbooks.quantumnest.com/security/suspicious-transactions"
          impact: "Potential fraud or money laundering activity"

      - alert: TransactionVolumeAnomaly
        expr: |
          (
            abs(rate(financial_transactions_total[5m]) - rate(financial_transactions_total[5m] offset 1w))
            /
            (rate(financial_transactions_total[5m] offset 1w) > 0)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          category: financial
          compliance: operational
        annotations:
          summary: "Transaction volume anomaly detected"
          description: "Current transaction rate differs by {{ $value | humanizePercentage }} from the same time last week"
          runbook_url: "https://runbooks.quantumnest.com/financial/volume-anomaly"

      - alert: LargeTransactionAlert
        expr: financial_transaction_amount_dollars > 100000
        for: 0s
        labels:
          severity: warning
          category: financial
          compliance: aml
        annotations:
          summary: "Large transaction detected"
          description: "Transaction amount of ${{ $value }} exceeds the $100,000 AML reporting threshold"
          runbook_url: "https://runbooks.quantumnest.com/financial/large-transactions"

      - alert: TransactionProcessingBacklog
        expr: financial_transactions_pending_total > 1000
        for: 2m
        labels:
          severity: warning
          category: financial
          compliance: operational
        annotations:
          summary: "Transaction processing backlog detected"
          description: "{{ $value }} transactions are pending processing"
          runbook_url: "https://runbooks.quantumnest.com/financial/processing-backlog"

  - name: database-alerts
    interval: 30s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          (pg_stat_database_numbackends / ignoring(datname) group_left pg_settings_max_connections) > 0.9
        for: 2m
        labels:
          severity: critical
          category: database
          compliance: operational
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database {{ $labels.datname }} is using {{ $value | humanizePercentage }} of available connections"
          runbook_url: "https://runbooks.quantumnest.com/database/connection-pool"

      - alert: DatabaseReplicationLag
        expr: pg_stat_replication_replay_lag_seconds > 30
        for: 1m
        labels:
          severity: warning
          category: database
          compliance: operational
        annotations:
          summary: "Database replication lag detected"
          description: "Replication lag is {{ $value }}s for replica {{ $labels.application_name }}"
          runbook_url: "https://runbooks.quantumnest.com/database/replication-lag"

      - alert: DatabaseDiskSpaceHigh
        expr: |
          (pg_database_size_bytes / (1024 * 1024 * 1024)) > 80
        for: 5m
        labels:
          severity: warning
          category: database
          compliance: operational
        annotations:
          summary: "Database disk usage high"
          description: "Database {{ $labels.datname }} is using {{ $value | humanizeSI }}B of disk space"
          runbook_url: "https://runbooks.quantumnest.com/database/disk-space"

      - alert: DatabaseDown
        expr: pg_up == 0
        for: 0s
        labels:
          severity: critical
          category: database
          compliance: operational
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL instance {{ $labels.instance }} is not responding"
          runbook_url: "https://runbooks.quantumnest.com/database/db-down"

  - name: security-alerts
    interval: 15s
    rules:
      - alert: UnauthorizedAPIAccess
        expr: increase(http_requests_total{code=~"401|403"}[1m]) > 50
        for: 1m
        labels:
          severity: critical
          category: security
          compliance: soc2
        annotations:
          summary: "High number of unauthorized API access attempts"
          description: "{{ $value }} unauthorized access attempts in the last minute on {{ $labels.service }}"
          runbook_url: "https://runbooks.quantumnest.com/security/unauthorized-access"

      - alert: VaultSealedAlert
        expr: vault_core_unsealed == 0
        for: 0s
        labels:
          severity: critical
          category: security
          compliance: soc2
        annotations:
          summary: "Vault is sealed"
          description: "HashiCorp Vault instance {{ $labels.instance }} is sealed - secrets unavailable"
          runbook_url: "https://runbooks.quantumnest.com/security/vault-sealed"

      - alert: CertificateExpiringSoon
        expr: (ssl_certificate_expiry_seconds - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
          category: security
          compliance: operational
        annotations:
          summary: "SSL certificate expiring soon"
          description: "Certificate {{ $labels.common_name }} expires in {{ $value | humanizeDuration }}"
          runbook_url: "https://runbooks.quantumnest.com/security/certificate-expiry"

      - alert: CertificateExpiryCritical
        expr: (ssl_certificate_expiry_seconds - time()) / 86400 < 7
        for: 1h
        labels:
          severity: critical
          category: security
          compliance: operational
        annotations:
          summary: "SSL certificate expiring within 7 days"
          description: "Certificate {{ $labels.common_name }} expires in {{ $value | humanizeDuration }} - immediate action required"
          runbook_url: "https://runbooks.quantumnest.com/security/certificate-expiry"

  - name: compliance-alerts
    interval: 60s
    rules:
      - alert: AuditLogMissing
        expr: absent(rate(audit_log_entries_total[5m]))
        for: 5m
        labels:
          severity: critical
          category: compliance
          compliance: soc2
        annotations:
          summary: "Audit logs are not being generated"
          description: "No audit log entries have been recorded in the last 5 minutes - compliance violation"
          runbook_url: "https://runbooks.quantumnest.com/compliance/audit-logs"

      - alert: EncryptionKeyRotationOverdue
        expr: (time() - encryption_key_last_rotation_timestamp) / 86400 > 90
        for: 1h
        labels:
          severity: warning
          category: compliance
          compliance: pci-dss
        annotations:
          summary: "Encryption key rotation overdue"
          description: "Encryption key has not been rotated for {{ $value }} days (max: 90)"
          runbook_url: "https://runbooks.quantumnest.com/compliance/key-rotation"

  - name: application-performance-alerts
    interval: 30s
    rules:
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
          category: performance
          compliance: operational
        annotations:
          summary: "High API response time"
          description: "P95 response time is {{ $value }}s for {{ $labels.method }} {{ $labels.endpoint }}"
          runbook_url: "https://runbooks.quantumnest.com/performance/high-response-time"

      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{code=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.01
        for: 2m
        labels:
          severity: critical
          category: performance
          compliance: operational
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.service }}"
          runbook_url: "https://runbooks.quantumnest.com/performance/high-error-rate"

      - alert: MemoryUsageHigh
        expr: |
          (container_memory_working_set_bytes{container!=""} / container_spec_memory_limit_bytes{container!=""}) > 0.9
        for: 5m
        labels:
          severity: warning
          category: performance
          compliance: operational
        annotations:
          summary: "High memory usage"
          description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of allocated memory"
          runbook_url: "https://runbooks.quantumnest.com/performance/high-memory"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
          category: performance
          compliance: operational
        annotations:
          summary: "Pod is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} is restarting frequently"
          runbook_url: "https://runbooks.quantumnest.com/performance/crash-loop"
